<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verimlilik Takip Programı</title>

<style>
:root {
    --primary: #c0392b;
    --secondary: #2c3e50;
    --success: #27ae60;
    --warning: #f39c12;
    --danger: #c0392b;
    --blue: #2980b9;
    --bg: #f4f7f6;
    --card: #ffffff;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    padding: 15px;
    color: #222;
}

.container {
    width: 100%;
    max-width: 520px;
    margin: auto;
}

.card {
    background: var(--card);
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 6px 25px rgba(0,0,0,0.10);
}

h1 {
    margin-top: 0;
    text-align: center;
    color: var(--secondary);
    font-size: 22px;
}

h2 {
    font-size: 16px;
    margin-top: 0;
    color: var(--secondary);
}

label {
    display: block;
    margin-top: 12px;
    margin-bottom: 5px;
    font-size: 12px;
    font-weight: bold;
    color: var(--primary);
    text-transform: uppercase;
}

input, select, textarea {
    width: 100%;
    padding: 11px;
    border: 1px solid #ddd;
    border-radius: 9px;
    font-size: 14px;
    background: #fafafa;
}

textarea {
    min-height: 70px;
    resize: vertical;
}

.row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 12px;
    font-size: 14px;
}

.btn-main {
    background: var(--secondary);
    color: white;
}

.btn-green {
    background: var(--success);
    color: white;
}

.btn-blue {
    background: var(--blue);
    color: white;
}

.btn-red {
    background: var(--danger);
    color: white;
}

.btn-light {
    background: #ecf0f1;
    color: #222;
}

.hidden {
    display: none;
}

.info-box {
    background: #eef2f3;
    padding: 12px;
    border-radius: 10px;
    text-align: center;
    font-size: 13px;
    margin-bottom: 12px;
    line-height: 1.5;
}

.result {
    margin-top: 15px;
    padding: 16px;
    border-radius: 12px;
    color: white;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

.success {
    background: var(--success);
}

.warning {
    background: var(--warning);
}

.danger {
    background: var(--danger);
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
}

.stat {
    color: white;
    padding: 13px;
    border-radius: 10px;
    text-align: center;
    font-size: 13px;
    font-weight: bold;
}

.analysis {
    margin-top: 12px;
    padding: 13px;
    border-left: 5px solid #f1c40f;
    background: #fffde7;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.6;
}

.history-item {
    background: #f8f8f8;
    border: 1px solid #ddd;
    padding: 10px;
    border-radius: 9px;
    margin-top: 8px;
    font-size: 13px;
}

.small {
    font-size: 12px;
    color: #666;
    text-align: center;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

    <div id="setupPage" class="card hidden">
        <h1>İlk Kurulum</h1>

        <label>Personel Adı</label>
        <input type="text" id="setupName" placeholder="Örn: Ahmet Yılmaz">

        <label>Hedef Verimlilik (%)</label>
        <input type="number" id="setupTargetPercent" placeholder="Örn: 65">

        <div class="row">
            <div>
                <label>Mesai Başlangıç</label>
                <input type="time" id="setupStartTime" value="08:30">
            </div>
            <div>
                <label>Mesai Bitiş</label>
                <input type="time" id="setupEndTime" value="18:45">
            </div>
        </div>

        <label>Varsayılan İşlem Süresi (dk)</label>
        <input type="number" id="setupDefaultProcessTime" placeholder="Örn: 10">

        <label>İşlem Başı Ek Süre (dk)</label>
        <input type="number" id="setupExtraPerProcess" value="2">

        <label>Ek İşlem Katsayısı</label>
        <input type="number" step="0.01" id="setupExtraCoefficient" value="0.5">

        <label>Toplantı / Eğitim Katsayısı</label>
        <input type="number" step="0.01" id="setupMeetingCoefficient" value="0.7">

        <button class="btn-main" onclick="saveSettings()">Ayarları Kaydet</button>

        <p class="small">Bu bilgiler tarayıcıda kayıtlı kalır.</p>
    </div>

    <div id="appPage" class="card hidden">
        <h1>Verimlilik Takibi</h1>

        <div class="info-box" id="userInfo"></div>

        <h2>Günlük Bilgiler</h2>

        <div class="row">
            <div>
                <label>Dinleme Adedi</label>
                <input type="number" id="dailyCount" placeholder="Adet">
            </div>
            <div>
                <label>Ortalama Süre</label>
                <input type="number" id="dailyAvgTime" placeholder="dk">
            </div>
        </div>

        <label>Ek İşlem Var mı?</label>
        <select id="extraEnabled" onchange="toggleExtraFields()">
            <option value="no">Hayır</option>
            <option value="yes">Evet</option>
        </select>

        <div id="extraFields" class="hidden">
            <div class="row">
                <div>
                    <label>Ek İşlem Adedi</label>
                    <input type="number" id="extraCount" placeholder="Adet">
                </div>
                <div>
                    <label>Ek İşlem Süresi</label>
                    <input type="number" id="extraAvgTime" placeholder="dk">
                </div>
            </div>
        </div>

        <label>Toplantı / Eğitim Süresi</label>
        <input type="number" id="meetingTime" placeholder="dk">

        <label>Günlük Not</label>
        <textarea id="dailyNote" placeholder="İsteğe bağlı not"></textarea>

        <button class="btn-main" onclick="calculate()">Hesapla</button>

        <div id="resultArea" class="hidden">
            <div id="mainResult" class="result"></div>

            <div class="grid">
                <div class="stat" style="background:#2980b9;" id="productionStat"></div>
                <div class="stat" style="background:#e67e22;" id="idleStat"></div>
                <div class="stat" style="background:#8e44ad;" id="targetStat"></div>
                <div class="stat" style="background:#16a085;" id="instantStat"></div>
            </div>

            <div class="analysis" id="analysisBox"></div>

            <button class="btn-green" onclick="saveDailyRecord()">Günü Kaydet</button>
            <button class="btn-blue" onclick="downloadExcel()">Excel İndir</button>
            <button class="btn-light" onclick="shareReport()">Raporu Paylaş / Kopyala</button>
        </div>

        <button class="btn-light" onclick="showHistory()">Geçmiş Kayıtları Göster</button>
        <button class="btn-red" onclick="resetSettings()">Ayarları Sıfırla</button>

        <div id="historyArea" class="hidden">
            <h2>Geçmiş Kayıtlar</h2>
            <div id="historyList"></div>
        </div>
    </div>

</div>

<script>
const SETTINGS_KEY = "verimlilik_ayarlar";
const RECORDS_KEY = "verimlilik_kayitlar";

let settings = null;
let lastReport = null;

document.addEventListener("DOMContentLoaded", init);

function init() {
    settings = getSettings();

    if (!settings) {
        document.getElementById("setupPage").classList.remove("hidden");
    } else {
        document.getElementById("appPage").classList.remove("hidden");
        loadApp();
    }
}

function getSettings() {
    const data = localStorage.getItem(SETTINGS_KEY);
    return data ? JSON.parse(data) : null;
}

function saveSettings() {
    const name = document.getElementById("setupName").value.trim();
    const targetPercent = Number(document.getElementById("setupTargetPercent").value);
    const startTime = document.getElementById("setupStartTime").value;
    const endTime = document.getElementById("setupEndTime").value;
    const defaultProcessTime = Number(document.getElementById("setupDefaultProcessTime").value);
    const extraPerProcess = Number(document.getElementById("setupExtraPerProcess").value);
    const extraCoefficient = Number(document.getElementById("setupExtraCoefficient").value);
    const meetingCoefficient = Number(document.getElementById("setupMeetingCoefficient").value);

    if (!name || !targetPercent || !startTime || !endTime || !defaultProcessTime) {
        alert("Lütfen zorunlu alanları doldur.");
        return;
    }

    const totalWorkMinutes = calculateWorkMinutes(startTime, endTime);

    if (totalWorkMinutes <= 0) {
        alert("Mesai bitiş saati başlangıçtan büyük olmalı.");
        return;
    }

    const targetMinutes = totalWorkMinutes * (targetPercent / 100);

    settings = {
        name,
        targetPercent,
        startTime,
        endTime,
        totalWorkMinutes,
        targetMinutes,
        defaultProcessTime,
        extraPerProcess: extraPerProcess || 0,
        extraCoefficient: extraCoefficient || 0.5,
        meetingCoefficient: meetingCoefficient || 0.7
    };

    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));

    document.getElementById("setupPage").classList.add("hidden");
    document.getElementById("appPage").classList.remove("hidden");

    loadApp();
}

function loadApp() {
    document.getElementById("dailyAvgTime").value = settings.defaultProcessTime;

    document.getElementById("userInfo").innerHTML = `
        👤 <b>${settings.name}</b><br>
        🕒 Mesai: <b>${settings.startTime} - ${settings.endTime}</b><br>
        🎯 Hedef: <b>%${settings.targetPercent}</b> |
        Hedef Süre: <b>${settings.targetMinutes.toFixed(0)} dk</b>
    `;
}

function calculateWorkMinutes(start, end) {
    const [sh, sm] = start.split(":").map(Number);
    const [eh, em] = end.split(":").map(Number);

    const startMinutes = sh * 60 + sm;
    const endMinutes = eh * 60 + em;

    return endMinutes - startMinutes;
}

function getElapsedMinutes() {
    const now = new Date();

    const [sh, sm] = settings.startTime.split(":").map(Number);
    const [eh, em] = settings.endTime.split(":").map(Number);

    const start = new Date();
    start.setHours(sh, sm, 0, 0);

    const end = new Date();
    end.setHours(eh, em, 0, 0);

    let elapsed = Math.floor((now - start) / 60000);
    elapsed = Math.max(1, Math.min(elapsed, settings.totalWorkMinutes));

    let remaining = Math.floor((end - now) / 60000);
    remaining = Math.max(0, remaining);

    return { elapsed, remaining };
}

function toggleExtraFields() {
    const enabled = document.getElementById("extraEnabled").value;

    if (enabled === "yes") {
        document.getElementById("extraFields").classList.remove("hidden");
    } else {
        document.getElementById("extraFields").classList.add("hidden");
    }
}

function calculate() {
    const dailyCount = Number(document.getElementById("dailyCount").value) || 0;
    const dailyAvgTime = Number(document.getElementById("dailyAvgTime").value) || settings.defaultProcessTime;

    const extraEnabled = document.getElementById("extraEnabled").value === "yes";
    const extraCount = extraEnabled ? Number(document.getElementById("extraCount").value) || 0 : 0;
    const extraAvgTime = extraEnabled ? Number(document.getElementById("extraAvgTime").value) || 0 : 0;

    const meetingTime = Number(document.getElementById("meetingTime").value) || 0;
    const note = document.getElementById("dailyNote").value.trim();

    const normalProduction = dailyCount * (dailyAvgTime + settings.extraPerProcess);
    const extraProduction = extraCount * extraAvgTime * settings.extraCoefficient;
    const meetingProduction = meetingTime * settings.meetingCoefficient;

    const totalProduction = normalProduction + extraProduction + meetingProduction;

    const generalEfficiency = (totalProduction / settings.totalWorkMinutes) * 100;
    const targetPerformance = (totalProduction / settings.targetMinutes) * 100;

    const time = getElapsedMinutes();
    const instantEfficiency = (totalProduction / time.elapsed) * 100;

    const idleMinutes = Math.max(0, time.elapsed - totalProduction);
    const remainingTargetMinutes = Math.max(0, settings.targetMinutes - totalProduction);

    const oneProcessMinute = dailyAvgTime + settings.extraPerProcess;
    const requiredProcessCount = Math.ceil(remainingTargetMinutes / oneProcessMinute);

    let statusClass = "danger";
    let statusText = "Hedef Altında";

    if (generalEfficiency >= settings.targetPercent) {
        statusClass = "success";
        statusText = "Hedef Tamamlandı";
    } else if (targetPerformance >= 80) {
        statusClass = "warning";
        statusText = "Hedefe Yaklaşıldı";
    }

    document.getElementById("resultArea").classList.remove("hidden");

    const mainResult = document.getElementById("mainResult");
    mainResult.className = `result ${statusClass}`;
    mainResult.innerHTML = `%${generalEfficiency.toFixed(1)}<br>${statusText}`;

    document.getElementById("productionStat").innerText =
        `${totalProduction.toFixed(0)} dk Üretim`;

    document.getElementById("idleStat").innerText =
        `${idleMinutes.toFixed(0)} dk Boş/Mola`;

    document.getElementById("targetStat").innerText =
        `${remainingTargetMinutes.toFixed(0)} dk Kalan Hedef`;

    document.getElementById("instantStat").innerText =
        `%${instantEfficiency.toFixed(1)} Anlık`;

    let message = "";

    if (remainingTargetMinutes <= 0) {
        message = "✅ Bugünkü hedef tamamlandı.";
    } else if (time.remaining <= 0) {
        message = "⛔ Mesai bitti, hedef tamamlanmadı.";
    } else {
        message = `⚠️ Hedef için yaklaşık <b>${requiredProcessCount}</b> işlem daha gerekiyor.`;
    }

    document.getElementById("analysisBox").innerHTML = `
        • Geçen süre: <b>${time.elapsed} dk</b><br>
        • Kalan süre: <b>${time.remaining} dk</b><br>
        • Normal üretim: <b>${normalProduction.toFixed(0)} dk</b><br>
        • Ek işlem üretimi: <b>${extraProduction.toFixed(0)} dk</b><br>
        • Toplantı/eğitim katkısı: <b>${meetingProduction.toFixed(0)} dk</b><br>
        • Hedefe göre performans: <b>%${targetPerformance.toFixed(1)}</b><br><br>
        ${message}
    `;

    lastReport = {
        date: new Date().toLocaleDateString("tr-TR"),
        time: new Date().toLocaleTimeString("tr-TR"),
        name: settings.name,
        dailyCount,
        dailyAvgTime,
        extraCount,
        extraAvgTime,
        meetingTime,
        normalProduction: normalProduction.toFixed(0),
        extraProduction: extraProduction.toFixed(0),
        meetingProduction: meetingProduction.toFixed(0),
        totalProduction: totalProduction.toFixed(0),
        generalEfficiency: generalEfficiency.toFixed(1),
        instantEfficiency: instantEfficiency.toFixed(1),
        targetPerformance: targetPerformance.toFixed(1),
        idleMinutes: idleMinutes.toFixed(0),
        remainingTargetMinutes: remainingTargetMinutes.toFixed(0),
        requiredProcessCount,
        note,
        statusText
    };
}

function saveDailyRecord() {
    if (!lastReport) {
        alert("Önce hesaplama yapmalısın.");
        return;
    }

    const records = getRecords();
    records.push(lastReport);

    localStorage.setItem(RECORDS_KEY, JSON.stringify(records));

    alert("Günlük kayıt kaydedildi.");
}

function getRecords() {
    const data = localStorage.getItem(RECORDS_KEY);
    return data ? JSON.parse(data) : [];
}

function showHistory() {
    const area = document.getElementById("historyArea");
    const list = document.getElementById("historyList");

    area.classList.toggle("hidden");

    const records = getRecords();

    if (records.length === 0) {
        list.innerHTML = "<p>Kayıt bulunamadı.</p>";
        return;
    }

    list.innerHTML = "";

    records.slice().reverse().forEach(record => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
            <b>${record.date} - ${record.time}</b><br>
            Personel: ${record.name}<br>
            Verimlilik: %${record.generalEfficiency}<br>
            Üretim: ${record.totalProduction} dk<br>
            Durum: ${record.statusText}
        `;
        list.appendChild(div);
    });
}

function downloadExcel() {
    const records = getRecords();

    if (records.length === 0) {
        alert("Excel için önce en az bir kayıt kaydetmelisin.");
        return;
    }

    let table = `
        <table border="1">
            <tr>
                <th>Tarih</th>
                <th>Saat</th>
                <th>Personel</th>
                <th>Dinleme Adedi</th>
                <th>Ortalama Süre</th>
                <th>Ek İşlem Adedi</th>
                <th>Ek İşlem Süresi</th>
                <th>Toplantı dk</th>
                <th>Toplam Üretim dk</th>
                <th>Genel Verimlilik</th>
                <th>Anlık Verimlilik</th>
                <th>Hedef Performansı</th>
                <th>Boş/Mola dk</th>
                <th>Kalan Hedef dk</th>
                <th>Gereken İşlem</th>
                <th>Durum</th>
                <th>Not</th>
            </tr>
    `;

    records.forEach(r => {
        table += `
            <tr>
                <td>${r.date}</td>
                <td>${r.time}</td>
                <td>${r.name}</td>
                <td>${r.dailyCount}</td>
                <td>${r.dailyAvgTime}</td>
                <td>${r.extraCount}</td>
                <td>${r.extraAvgTime}</td>
                <td>${r.meetingTime}</td>
                <td>${r.totalProduction}</td>
                <td>%${r.generalEfficiency}</td>
                <td>%${r.instantEfficiency}</td>
                <td>%${r.targetPerformance}</td>
                <td>${r.idleMinutes}</td>
                <td>${r.remainingTargetMinutes}</td>
                <td>${r.requiredProcessCount}</td>
                <td>${r.statusText}</td>
                <td>${r.note || ""}</td>
            </tr>
        `;
    });

    table += "</table>";

    const blob = new Blob(["\ufeff" + table], {
        type: "application/vnd.ms-excel"
    });

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");

    a.href = url;
    a.download = "verimlilik_raporu.xls";
    a.click();

    URL.revokeObjectURL(url);
}

async function shareReport() {
    if (!lastReport) {
        alert("Önce hesaplama yapmalısın.");
        return;
    }

    const text =
`📊 Verimlilik Raporu

Personel: ${lastReport.name}
Tarih: ${lastReport.date}
Genel Verimlilik: %${lastReport.generalEfficiency}
Anlık Verimlilik: %${lastReport.instantEfficiency}
Toplam Üretim: ${lastReport.totalProduction} dk
Boş/Mola: ${lastReport.idleMinutes} dk
Kalan Hedef: ${lastReport.remainingTargetMinutes} dk
Durum: ${lastReport.statusText}`;

    if (navigator.share) {
        await navigator.share({ text });
    } else {
        await navigator.clipboard.writeText(text);
        alert("Rapor kopyalandı.");
    }
}

function resetSettings() {
    const ok = confirm("Ayarları sıfırlamak istiyor musun? Kayıtlar silinmez.");

    if (!ok) return;

    localStorage.removeItem(SETTINGS_KEY);
    location.reload();
}
</script>

</body>
</html>
