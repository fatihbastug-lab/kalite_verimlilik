<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performans Takip</title>

<style>
:root{
    --bg:#f4f7f6;
    --card:#fff;
    --dark:#2c3e50;
    --red:#c0392b;
    --green:#27ae60;
    --orange:#f39c12;
    --blue:#2980b9;
    --purple:#8e44ad;
}
*{box-sizing:border-box}
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:var(--bg);
    color:#222;
    padding:14px;
}
.container{
    max-width:620px;
    margin:auto;
}
.card{
    background:var(--card);
    border-radius:18px;
    padding:18px;
    box-shadow:0 6px 24px rgba(0,0,0,.1);
    margin-bottom:14px;
}
h1,h2{
    margin-top:0;
    text-align:center;
    color:var(--dark);
}
h1{font-size:24px}
h2{font-size:17px}
label{
    display:block;
    margin-top:11px;
    margin-bottom:5px;
    font-size:12px;
    font-weight:bold;
    color:var(--red);
    text-transform:uppercase;
}
input,select,textarea{
    width:100%;
    padding:11px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:14px;
    background:#fafafa;
}
textarea{
    min-height:65px;
    resize:vertical;
}
.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}
button{
    width:100%;
    padding:13px;
    border:0;
    border-radius:11px;
    font-weight:bold;
    font-size:14px;
    cursor:pointer;
    margin-top:10px;
}
.btn-dark{background:var(--dark);color:white}
.btn-green{background:var(--green);color:white}
.btn-blue{background:var(--blue);color:white}
.btn-red{background:var(--red);color:white}
.btn-light{background:#ecf0f1;color:#222}
.hidden{display:none}
.tabs{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin-bottom:12px;
}
.tabs button{
    margin-top:0;
    padding:11px;
}
.active{
    background:var(--dark)!important;
    color:white!important;
}
.info{
    background:#eef2f3;
    padding:12px;
    border-radius:12px;
    text-align:center;
    line-height:1.6;
    font-size:13px;
    margin-bottom:12px;
}
.result{
    margin-top:14px;
    padding:17px;
    border-radius:14px;
    color:white;
    text-align:center;
    font-size:23px;
    font-weight:bold;
}
.success{background:var(--green)}
.warning{background:var(--orange)}
.danger{background:var(--red)}
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:12px;
}
.stat{
    color:white;
    border-radius:12px;
    padding:13px;
    text-align:center;
    font-weight:bold;
    font-size:13px;
}
.analysis{
    background:#fffde7;
    border-left:5px solid #f1c40f;
    padding:13px;
    border-radius:10px;
    margin-top:12px;
    line-height:1.6;
    font-size:14px;
}
.history-item{
    background:#f8f8f8;
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
    margin-top:8px;
    font-size:13px;
    line-height:1.5;
}
.small{
    font-size:12px;
    color:#666;
    text-align:center;
}
</style>
</head>

<body>
<div class="container">

<div id="setupPage" class="card hidden">
    <h1>Performans Takip</h1>
    <h2>İlk Kurulum</h2>

    <label>Personel Adı</label>
    <input id="setName" placeholder="Ad Soyad">

    <label>Hedef Verimlilik (%)</label>
    <input id="setTarget" type="number" value="65">

    <div class="row">
        <div>
            <label>Mesai Başlangıç</label>
            <input id="setStart" type="time" value="08:30">
        </div>
        <div>
            <label>Mesai Bitiş</label>
            <input id="setEnd" type="time" value="18:45">
        </div>
    </div>

    <label>Varsayılan İşlem Süresi (dk)</label>
    <input id="setDefaultTime" type="number" value="10">

    <label>İşlem Başı Ek Süre (dk)</label>
    <input id="setExtraPerItem" type="number" value="2">

    <label>Ek İşlem Katsayısı</label>
    <input id="setExtraCoef" type="number" step="0.01" value="0.5">

    <label>Toplantı / Eğitim Katsayısı</label>
    <input id="setMeetingCoef" type="number" step="0.01" value="0.7">

    <button class="btn-dark" onclick="saveSettings()">Ayarları Kaydet</button>
    <p class="small">Ayarlar bu cihazda kayıtlı kalır.</p>
</div>

<div id="appPage" class="hidden">
    <div class="card">
        <h1>Performans Takip</h1>
        <div id="infoBox" class="info"></div>

        <div class="tabs">
            <button id="tabDaily" class="active" onclick="showTab('daily')">Günlük</button>
            <button id="tabMonthly" class="btn-light" onclick="showTab('monthly')">Aylık</button>
            <button id="tabRecords" class="btn-light" onclick="showTab('records')">Kayıtlar</button>
        </div>
    </div>

    <div id="dailyPage" class="card">
        <h2>Günlük Hesaplama</h2>

        <div class="row">
            <div>
                <label>Dinleme Adedi</label>
                <input id="dCount" type="number" placeholder="Adet">
            </div>
            <div>
                <label>Ortalama Süre</label>
                <input id="dAvg" type="number" placeholder="dk">
            </div>
        </div>

        <label>Ek İşlem Var mı?</label>
        <select id="dExtraStatus" onchange="toggleDailyExtra()">
            <option value="no">Hayır</option>
            <option value="yes">Evet</option>
        </select>

        <div id="dailyExtra" class="hidden">
            <div class="row">
                <div>
                    <label>Ek İşlem Adedi</label>
                    <input id="dExtraCount" type="number">
                </div>
                <div>
                    <label>Ek İşlem Süresi</label>
                    <input id="dExtraAvg" type="number">
                </div>
            </div>
        </div>

        <label>Toplantı / Eğitim Süresi</label>
        <input id="dMeeting" type="number" placeholder="dk">

        <label>Günlük Not</label>
        <textarea id="dNote" placeholder="İsteğe bağlı"></textarea>

        <button class="btn-dark" onclick="calculateDaily()">Günlük Hesapla</button>

        <div id="dailyResult" class="hidden"></div>
    </div>

    <div id="monthlyPage" class="card hidden">
        <h2>Aylık Hesaplama</h2>

        <label>Ay</label>
        <input id="mMonth" type="month">

        <label>Çalışılan Gün Sayısı</label>
        <input id="mWorkDays" type="number" placeholder="Örn: 22">

        <div class="row">
            <div>
                <label>Toplam Dinleme</label>
                <input id="mCount" type="number">
            </div>
            <div>
                <label>Ortalama Süre</label>
                <input id="mAvg" type="number">
            </div>
        </div>

        <div class="row">
            <div>
                <label>Ek İşlem Adedi</label>
                <input id="mExtraCount" type="number">
            </div>
            <div>
                <label>Ek İşlem Süresi</label>
                <input id="mExtraAvg" type="number">
            </div>
        </div>

        <label>Toplam Toplantı / Eğitim Süresi</label>
        <input id="mMeeting" type="number" placeholder="dk">

        <label>Aylık Not</label>
        <textarea id="mNote" placeholder="İsteğe bağlı"></textarea>

        <button class="btn-dark" onclick="calculateMonthly()">Aylık Hesapla</button>

        <div id="monthlyResult" class="hidden"></div>
    </div>

    <div id="recordsPage" class="card hidden">
        <h2>Kayıtlar</h2>
        <button class="btn-blue" onclick="downloadExcel()">Excel İndir</button>
        <button class="btn-red" onclick="clearRecords()">Kayıtları Temizle</button>
        <button class="btn-light" onclick="resetSettings()">Ayarları Sıfırla</button>
        <div id="recordsList"></div>
    </div>
</div>

</div>

<script>
const SETTINGS_KEY = "pt_settings_v1";
const RECORDS_KEY = "pt_records_v1";

let settings = null;
let lastReport = null;

document.addEventListener("DOMContentLoaded", init);

function init(){
    settings = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "null");

    if(!settings){
        document.getElementById("setupPage").classList.remove("hidden");
    }else{
        document.getElementById("appPage").classList.remove("hidden");
        loadApp();
    }
}

function saveSettings(){
    const name = val("setName").trim();
    const target = num("setTarget");
    const start = val("setStart");
    const end = val("setEnd");
    const defaultTime = num("setDefaultTime");

    if(!name || !target || !start || !end || !defaultTime){
        alert("Lütfen zorunlu alanları doldur.");
        return;
    }

    const totalMinutes = workMinutes(start,end);
    if(totalMinutes <= 0){
        alert("Mesai bitiş saati başlangıçtan büyük olmalı.");
        return;
    }

    settings = {
        name,
        target,
        start,
        end,
        totalMinutes,
        targetMinutes: totalMinutes * target / 100,
        defaultTime,
        extraPerItem: num("setExtraPerItem"),
        extraCoef: num("setExtraCoef") || 0.5,
        meetingCoef: num("setMeetingCoef") || 0.7
    };

    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    location.reload();
}

function loadApp(){
    document.getElementById("infoBox").innerHTML = `
        👤 <b>${settings.name}</b><br>
        🕒 Mesai: <b>${settings.start} - ${settings.end}</b> |
        Toplam: <b>${settings.totalMinutes} dk</b><br>
        🎯 Hedef: <b>%${settings.target}</b> |
        Hedef Süre: <b>${settings.targetMinutes.toFixed(0)} dk</b>
    `;

    document.getElementById("dAvg").value = settings.defaultTime;
    document.getElementById("mAvg").value = settings.defaultTime;

    const now = new Date();
    document.getElementById("mMonth").value =
        now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0");
}

function showTab(tab){
    ["daily","monthly","records"].forEach(t=>{
        document.getElementById(t+"Page").classList.add("hidden");
        document.getElementById("tab"+cap(t)).classList.remove("active");
    });

    document.getElementById(tab+"Page").classList.remove("hidden");
    document.getElementById("tab"+cap(tab)).classList.add("active");

    if(tab === "records") renderRecords();
}

function toggleDailyExtra(){
    const yes = val("dExtraStatus") === "yes";
    document.getElementById("dailyExtra").classList.toggle("hidden", !yes);
}

function calculateDaily(){
    const count = num("dCount");
    const avg = num("dAvg") || settings.defaultTime;
    const meeting = num("dMeeting");
    const note = val("dNote");

    const extraOn = val("dExtraStatus") === "yes";
    const extraCount = extraOn ? num("dExtraCount") : 0;
    const extraAvg = extraOn ? num("dExtraAvg") : 0;

    const production = calcProduction(count,avg,extraCount,extraAvg,meeting);
    const time = elapsedToday();

    const efficiency = production.total / settings.totalMinutes * 100;
    const instant = production.total / time.elapsed * 100;
    const targetPerformance = production.total / settings.targetMinutes * 100;
    const idle = Math.max(0, time.elapsed - production.total);
    const remainingTarget = Math.max(0, settings.targetMinutes - production.total);

    const currentSpeed = production.total / time.elapsed;
    const projectedProduction = currentSpeed * settings.totalMinutes;
    const projectedEfficiency = projectedProduction / settings.totalMinutes * 100;

    const requiredCount = Math.ceil(remainingTarget / (avg + settings.extraPerItem));
    const score = performanceScore(efficiency, targetPerformance, instant);

    const status = getStatus(efficiency, targetPerformance);
    const advice = dailyAdvice(efficiency, projectedEfficiency, remainingTarget, requiredCount);

    lastReport = {
        type:"Günlük",
        date:new Date().toLocaleDateString("tr-TR"),
        time:new Date().toLocaleTimeString("tr-TR"),
        name:settings.name,
        count,
        avg,
        extraCount,
        extraAvg,
        meeting,
        totalProduction:production.total.toFixed(0),
        efficiency:efficiency.toFixed(1),
        instant:instant.toFixed(1),
        targetPerformance:targetPerformance.toFixed(1),
        projectedEfficiency:projectedEfficiency.toFixed(1),
        idle:idle.toFixed(0),
        remainingTarget:remainingTarget.toFixed(0),
        requiredCount,
        score,
        status:status.text,
        note
    };

    renderResult("dailyResult", lastReport, production, `
        • Geçen süre: <b>${time.elapsed} dk</b><br>
        • Kalan süre: <b>${time.remaining} dk</b><br>
        • Gün sonu tahmini verim: <b>%${projectedEfficiency.toFixed(1)}</b><br>
        • Performans skoru: <b>${score}/100</b><br><br>
        ${advice}
    `);
}

function calculateMonthly(){
    const month = val("mMonth");
    const workDays = num("mWorkDays");
    const count = num("mCount");
    const avg = num("mAvg") || settings.defaultTime;
    const extraCount = num("mExtraCount");
    const extraAvg = num("mExtraAvg");
    const meeting = num("mMeeting");
    const note = val("mNote");

    if(!workDays){
        alert("Çalışılan gün sayısını gir.");
        return;
    }

    const monthlyWork = settings.totalMinutes * workDays;
    const monthlyTarget = settings.targetMinutes * workDays;

    const production = calcProduction(count,avg,extraCount,extraAvg,meeting);

    const efficiency = production.total / monthlyWork * 100;
    const targetPerformance = production.total / monthlyTarget * 100;
    const dailyAvgProduction = production.total / workDays;
    const dailyAvgCount = count / workDays;
    const remainingTarget = Math.max(0, monthlyTarget - production.total);
    const extraTarget = Math.max(0, production.total - monthlyTarget);
    const requiredDaily = remainingTarget > 0 ? remainingTarget / workDays : 0;
    const requiredCount = Math.ceil(remainingTarget / (avg + settings.extraPerItem));
    const score = performanceScore(efficiency, targetPerformance, efficiency);
    const status = getStatus(efficiency, targetPerformance);

    lastReport = {
        type:"Aylık",
        date:month,
        time:"-",
        name:settings.name,
        workDays,
        count,
        avg,
        extraCount,
        extraAvg,
        meeting,
        totalProduction:production.total.toFixed(0),
        efficiency:efficiency.toFixed(1),
        instant:"-",
        targetPerformance:targetPerformance.toFixed(1),
        projectedEfficiency:"-",
        idle:"-",
        remainingTarget:remainingTarget.toFixed(0),
        requiredCount,
        score,
        status:status.text,
        note
    };

    renderResult("monthlyResult", lastReport, production, `
        • Aylık toplam mesai: <b>${monthlyWork.toFixed(0)} dk</b><br>
        • Aylık hedef süre: <b>${monthlyTarget.toFixed(0)} dk</b><br>
        • Günlük ortalama üretim: <b>${dailyAvgProduction.toFixed(1)} dk</b><br>
        • Günlük ortalama dinleme: <b>${dailyAvgCount.toFixed(1)} adet</b><br>
        • Hedef fazlası: <b>${extraTarget.toFixed(0)} dk</b><br>
        • Eksik hedef: <b>${remainingTarget.toFixed(0)} dk</b><br>
        • Günlük kapatılması gereken eksik: <b>${requiredDaily.toFixed(1)} dk</b><br>
        • Performans skoru: <b>${score}/100</b>
    `);
}

function renderResult(targetId, report, production, extraHtml){
    const status = getStatus(Number(report.efficiency), Number(report.targetPerformance));

    const html = `
        <div class="result ${status.className}">
            %${report.efficiency}<br>${status.text}
        </div>

        <div class="grid">
            <div class="stat" style="background:#2980b9">${report.totalProduction} dk Üretim</div>
            <div class="stat" style="background:#e67e22">%${report.targetPerformance} Hedef</div>
            <div class="stat" style="background:#8e44ad">${report.remainingTarget} dk Eksik</div>
            <div class="stat" style="background:#16a085">${report.score}/100 Skor</div>
        </div>

        <div class="analysis">
            • Normal üretim: <b>${production.normal.toFixed(0)} dk</b><br>
            • Ek işlem üretimi: <b>${production.extra.toFixed(0)} dk</b><br>
            • Toplantı/eğitim katkısı: <b>${production.meeting.toFixed(0)} dk</b><br>
            ${extraHtml}
        </div>

        <button class="btn-green" onclick="saveRecord()">Kaydet</button>
        <button class="btn-blue" onclick="copyReport()">Raporu Kopyala / Paylaş</button>
    `;

    document.getElementById(targetId).innerHTML = html;
    document.getElementById(targetId).classList.remove("hidden");
}

function calcProduction(count,avg,extraCount,extraAvg,meeting){
    const normal = count * (avg + settings.extraPerItem);
    const extra = extraCount * extraAvg * settings.extraCoef;
    const meet = meeting * settings.meetingCoef;

    return {
        normal,
        extra,
        meeting:meet,
        total:normal + extra + meet
    };
}

function getStatus(efficiency, targetPerformance){
    if(efficiency >= settings.target){
        return {text:"Hedef Tamamlandı", className:"success"};
    }
    if(targetPerformance >= 80){
        return {text:"Hedefe Yaklaşıldı", className:"warning"};
    }
    return {text:"Hedef Altında", className:"danger"};
}

function dailyAdvice(eff, projected, remaining, requiredCount){
    if(eff >= settings.target){
        return "✅ Bugünkü hedef tamamlandı. Gün kapatılabilir.";
    }
    if(projected >= settings.target){
        return "✅ Bu tempoyla devam edilirse gün sonunda hedef yakalanır.";
    }
    return `⚠️ Hedef için yaklaşık <b>${requiredCount}</b> işlem daha gerekiyor. Eksik süre: <b>${remaining.toFixed(0)} dk</b>.`;
}

function performanceScore(efficiency,targetPerformance,instant){
    let score = 0;
    score += Math.min(50, efficiency / settings.target * 50);
    score += Math.min(35, targetPerformance / 100 * 35);
    score += Math.min(15, instant / settings.target * 15);
    return Math.round(Math.min(100, score));
}

function saveRecord(){
    if(!lastReport){
        alert("Önce hesaplama yap.");
        return;
    }

    const records = getRecords();
    records.push(lastReport);
    localStorage.setItem(RECORDS_KEY, JSON.stringify(records));
    alert("Kayıt oluşturuldu.");
}

function getRecords(){
    return JSON.parse(localStorage.getItem(RECORDS_KEY) || "[]");
}

function renderRecords(){
    const records = getRecords();
    const list = document.getElementById("recordsList");

    if(records.length === 0){
        list.innerHTML = "<p class='small'>Henüz kayıt yok.</p>";
        return;
    }

    list.innerHTML = "";

    records.slice().reverse().forEach(r=>{
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
            <b>${r.type} Kayıt</b><br>
            Tarih: ${r.date} ${r.time}<br>
            Personel: ${r.name}<br>
            Verimlilik: <b>%${r.efficiency}</b><br>
            Üretim: <b>${r.totalProduction} dk</b><br>
            Durum: <b>${r.status}</b><br>
            Skor: <b>${r.score}/100</b>
        `;
        list.appendChild(div);
    });
}

function downloadExcel(){
    const records = getRecords();
    if(records.length === 0){
        alert("İndirilecek kayıt yok.");
        return;
    }

    let table = `
    <table border="1">
    <tr>
        <th>Tür</th><th>Tarih</th><th>Saat</th><th>Personel</th>
        <th>Çalışma Günü</th><th>Dinleme</th><th>Ortalama Süre</th>
        <th>Ek İşlem</th><th>Ek Süre</th><th>Toplantı</th>
        <th>Üretim</th><th>Verim</th><th>Hedef</th>
        <th>Eksik</th><th>Gereken İşlem</th><th>Skor</th><th>Durum</th><th>Not</th>
    </tr>`;

    records.forEach(r=>{
        table += `
        <tr>
            <td>${r.type}</td>
            <td>${r.date}</td>
            <td>${r.time}</td>
            <td>${r.name}</td>
            <td>${r.workDays || ""}</td>
            <td>${r.count}</td>
            <td>${r.avg}</td>
            <td>${r.extraCount}</td>
            <td>${r.extraAvg}</td>
            <td>${r.meeting}</td>
            <td>${r.totalProduction}</td>
            <td>%${r.efficiency}</td>
            <td>%${r.targetPerformance}</td>
            <td>${r.remainingTarget}</td>
            <td>${r.requiredCount}</td>
            <td>${r.score}</td>
            <td>${r.status}</td>
            <td>${r.note || ""}</td>
        </tr>`;
    });

    table += "</table>";

    const blob = new Blob(["\ufeff"+table], {type:"application/vnd.ms-excel"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "performans_takip_raporu.xls";
    a.click();
    URL.revokeObjectURL(url);
}

async function copyReport(){
    if(!lastReport){
        alert("Önce hesaplama yap.");
        return;
    }

    const text =
`📊 ${lastReport.type} Performans Raporu

Personel: ${lastReport.name}
Tarih: ${lastReport.date}
Verimlilik: %${lastReport.efficiency}
Hedef Performansı: %${lastReport.targetPerformance}
Toplam Üretim: ${lastReport.totalProduction} dk
Eksik Hedef: ${lastReport.remainingTarget} dk
Gereken İşlem: ${lastReport.requiredCount}
Skor: ${lastReport.score}/100
Durum: ${lastReport.status}`;

    if(navigator.share){
        await navigator.share({text});
    }else{
        await navigator.clipboard.writeText(text);
        alert("Rapor kopyalandı.");
    }
}

function clearRecords(){
    if(confirm("Tüm kayıtlar silinsin mi?")){
        localStorage.removeItem(RECORDS_KEY);
        renderRecords();
    }
}

function resetSettings(){
    if(confirm("Ayarlar sıfırlansın mı? Kayıtlar silinmez.")){
        localStorage.removeItem(SETTINGS_KEY);
        location.reload();
    }
}

function elapsedToday(){
    const now = new Date();

    const [sh,sm] = settings.start.split(":").map(Number);
    const [eh,em] = settings.end.split(":").map(Number);

    const start = new Date();
    start.setHours(sh,sm,0,0);

    const end = new Date();
    end.setHours(eh,em,0,0);

    let elapsed = Math.floor((now - start) / 60000);
    elapsed = Math.max(1, Math.min(elapsed, settings.totalMinutes));

    let remaining = Math.floor((end - now) / 60000);
    remaining = Math.max(0, remaining);

    return {elapsed,remaining};
}

function workMinutes(start,end){
    const [sh,sm] = start.split(":").map(Number);
    const [eh,em] = end.split(":").map(Number);
    return (eh*60+em) - (sh*60+sm);
}

function val(id){
    return document.getElementById(id).value;
}

function num(id){
    return Number(document.getElementById(id).value) || 0;
}

function cap(s){
    return s.charAt(0).toUpperCase() + s.slice(1);
}
