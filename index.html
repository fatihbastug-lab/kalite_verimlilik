<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performans Paneli PRO</title>

<style>
body{font-family:Arial;margin:0;background:#f1f5f9}
.container{max-width:700px;margin:auto;padding:15px}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:10px}
button{padding:10px;width:100%;margin-top:8px;border:none;border-radius:8px;cursor:pointer}
.primary{background:#1e3a8a;color:white}
.green{background:#16a34a;color:white}
.red{background:#dc2626;color:white}
input{width:100%;padding:10px;margin-top:5px}
.hidden{display:none}
</style>
</head>

<body>
<div class="container">

<div id="home" class="card">
<h2>Ana Menü</h2>
<button class="primary" onclick="show('login')">Giriş Yap</button>
<button onclick="show('setup')">İlk Kurulum</button>
</div>

<div id="setup" class="card hidden">
<h2>Yönetici Oluştur</h2>
<input id="adminName" placeholder="Ad">
<input id="adminPin" type="password" placeholder="PIN">
<button class="primary" onclick="createAdmin()">Kaydet</button>
</div>

<div id="login" class="card hidden">
<h2>Giriş</h2>
<input id="loginName" placeholder="Ad">
<input id="loginPin" type="password" placeholder="PIN">
<button class="primary" onclick="login()">Giriş</button>
</div>

<div id="panel" class="card hidden">
<h2 id="userInfo"></h2>

<input id="count" placeholder="Dinleme adedi">
<input id="avg" placeholder="Ortalama süre">

<button class="primary" onclick="calc()">Hesapla</button>

<div id="result"></div>

<canvas id="chart" height="150"></canvas>

<button class="green" onclick="save()">Kaydet</button>
<button onclick="exportJSON()">JSON İndir</button>
<input type="file" onchange="importJSON(event)">

<button class="red" onclick="logout()">Çıkış</button>
</div>

</div>

<script>
let users = JSON.parse(localStorage.getItem("users")||"[]");
let currentUser = null;

function show(id){
document.querySelectorAll(".card").forEach(x=>x.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

async function hash(text){
const msgUint8 = new TextEncoder().encode(text);
const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
return Array.from(new Uint8Array(hashBuffer))
.map(b => b.toString(16).padStart(2,'0')).join('');
}

async function createAdmin(){
const name = adminName.value;
const pin = await hash(adminPin.value);

users.push({name,pin,records:[]});
localStorage.setItem("users",JSON.stringify(users));
alert("Admin oluşturuldu");
show("home");
}

async function login(){
const name = loginName.value;
const pin = await hash(loginPin.value);

const user = users.find(u=>u.name===name && u.pin===pin);

if(!user){alert("Hatalı");return;}

currentUser = user;
userInfo.innerText = "Hoşgeldin " + user.name;
show("panel");
draw();
}

function logout(){
currentUser=null;
show("home");
}

function calc(){
const count = Number(countInput.value || count.value);
const avg = Number(avgInput.value || avg.value);

const total = count * avg;
const eff = total / 480 * 100;

result.innerHTML = `
<b>Üretim:</b> ${total}<br>
<b>Verim:</b> %${eff.toFixed(1)}
`;

return {total,eff};
}

function save(){
const data = calc();
currentUser.records.push({...data,date:new Date()});
localStorage.setItem("users",JSON.stringify(users));
draw();
alert("Kaydedildi");
}

function draw(){
const ctx = document.getElementById("chart").getContext("2d");
ctx.clearRect(0,0,300,150);

currentUser.records.forEach((r,i)=>{
ctx.fillRect(i*20,150-r.eff,10,r.eff);
});
}

function exportJSON(){
const blob = new Blob([JSON.stringify(users)],{type:"application/json"});
const a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "data.json";
a.click();
}

function importJSON(e){
const file = e.target.files[0];
const reader = new FileReader();

reader.onload = function(){
users = JSON.parse(reader.result);
localStorage.setItem("users",JSON.stringify(users));
alert("Yüklendi");
};

reader.readAsText(file);
}
</script>

</body>
</html>
